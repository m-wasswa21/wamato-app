name: wamato
description: Wamato – Uganda's Trusted Property Marketplace
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  intl: ^0.20.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  font_awesome_flutter: ^10.8.0
  url_launcher: ^6.3.1
  location: ^5.0.3
  http: ^1.2.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  shared_preferences: ^2.3.2
  go_router: ^14.3.0
  flutter_form_builder: ^10.0.0
  form_builder_validators: ^11.0.0
  shimmer: ^3.0.0
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
